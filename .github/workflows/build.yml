name: Build

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Generate Xcode Project
        run: chmod +x create_xcode_project.sh && bash create_xcode_project.sh

      - name: Build for iOS Simulator
        run: |
          xcodebuild build \
            -project ArcanaCodex.xcodeproj \
            -scheme ArcanaCodex \
            -sdk iphonesimulator \
            -destination "generic/platform=iOS Simulator" \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            CODE_SIGNING_ALLOWED=NO
