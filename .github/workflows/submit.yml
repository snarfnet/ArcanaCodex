name: Submit to App Store Connect

on:
  workflow_dispatch:

jobs:
  submit:
    runs-on: macos-15

    env:
      ASC_KEY_ID: WDXGY9WX55
      ASC_ISSUER_ID: 2be0734f-943a-4d61-9dc9-5d9045c46fec
      APPLE_TEAM_ID: 83VGKGSQUH

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode*.app | sort -V | tail -n 1)
          sudo xcode-select -s "$XCODE_PATH"
          xcodebuild -version

      - name: Generate Xcode Project
        run: chmod +x create_xcode_project.sh && bash create_xcode_project.sh

      - name: Prepare App Store Connect API key
        run: |
          mkdir -p "$RUNNER_TEMP/private_keys"
          printf '%s' '${{ secrets.ASC_API_KEY_CONTENT }}' | base64 --decode > "$RUNNER_TEMP/private_keys/AuthKey_${ASC_KEY_ID}.p8"
          chmod 600 "$RUNNER_TEMP/private_keys/AuthKey_${ASC_KEY_ID}.p8"

      - name: Clean up old certificates
        run: |
          pip install pyjwt --quiet
          python3 -c "
          import jwt, time, requests
          KEY_ID = '${ASC_KEY_ID}'
          ISSUER_ID = '${ASC_ISSUER_ID}'
          with open('$RUNNER_TEMP/private_keys/AuthKey_${ASC_KEY_ID}.p8') as f:
              key = f.read()
          token = jwt.encode({'iss': ISSUER_ID, 'iat': int(time.time()), 'exp': int(time.time()) + 600, 'aud': 'appstoreconnect-v1'}, key, algorithm='ES256', headers={'kid': KEY_ID})
          headers = {'Authorization': f'Bearer {token}'}
          r = requests.get('https://api.appstoreconnect.apple.com/v1/certificates?limit=200&filter[certificateType]=DEVELOPMENT', headers=headers)
          certs = r.json().get('data', [])
          if len(certs) > 5:
              for c in sorted(certs, key=lambda x: x['attributes'].get('expirationDate',''))[:-2]:
                  requests.delete(f'https://api.appstoreconnect.apple.com/v1/certificates/{c[\"id\"]}', headers=headers)
              print(f'Cleaned {len(certs)-2} old certificates')
          else:
              print(f'{len(certs)} certificates, no cleanup needed')
          "

      - name: Archive
        run: |
          xcodebuild archive \
            -project ArcanaCodex.xcodeproj \
            -scheme ArcanaCodex \
            -archivePath "$RUNNER_TEMP/ArcanaCodex.xcarchive" \
            -destination "generic/platform=iOS" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$RUNNER_TEMP/private_keys/AuthKey_${ASC_KEY_ID}.p8" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_STYLE=Automatic

      - name: Export IPA
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>teamID</key>
            <string>$APPLE_TEAM_ID</string>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/ArcanaCodex.xcarchive" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -exportPath "$RUNNER_TEMP/export" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$RUNNER_TEMP/private_keys/AuthKey_${ASC_KEY_ID}.p8" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID"

      - name: Upload IPA
        run: |
          mkdir -p "$HOME/.appstoreconnect/private_keys"
          cp "$RUNNER_TEMP/private_keys/AuthKey_${ASC_KEY_ID}.p8" "$HOME/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8"
          xcrun altool --upload-app \
            -f "$RUNNER_TEMP/export/ArcanaCodex.ipa" \
            -t ios \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: ArcanaCodex-ipa
          path: ${{ runner.temp }}/export/ArcanaCodex.ipa
